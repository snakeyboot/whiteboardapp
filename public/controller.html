<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Controller — Classroom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .dot.disconnected { background: #ef4444; }

    .sections { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* ── Timer ── */
    .timer-display {
      font-size: 72px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      color: #f8fafc;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .timer-display.urgent  { color: #f87171; }
    .timer-display.warning { color: #fbbf24; }
    .timer-display.entry   { color: #60a5fa; }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .numpad-btn {
      padding: 14px 0;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s;
      text-align: center;
    }

    .numpad-btn:hover  { background: #1e3a5f; border-color: #3b82f6; }
    .numpad-btn:active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .numpad-btn.del-btn { color: #94a3b8; font-size: 18px; }
    .numpad-btn.clr-btn { color: #f87171; font-size: 14px; font-weight: 700; }

    .timer-controls { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-green  { background: #16a34a; color: #fff; }
    .btn-green:hover  { background: #15803d; }
    .btn-yellow { background: #d97706; color: #fff; }
    .btn-yellow:hover { background: #b45309; }
    .btn-gray   { background: #334155; color: #e2e8f0; }
    .btn-gray:hover   { background: #475569; }
    .btn-blue   { background: #2563eb; color: #fff; }
    .btn-blue:hover   { background: #1d4ed8; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn-red:hover    { background: #b91c1c; }
    .btn-purple { background: #7c3aed; color: #fff; }
    .btn-purple:hover { background: #6d28d9; }
    .btn-teal   { background: #0d9488; color: #fff; }
    .btn-teal:hover   { background: #0f766e; }

    /* ── Roster tabs ── */
    .roster-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tab-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .tab-btn.add-tab { background: transparent; border-style: dashed; color: #64748b; padding: 6px 10px; }
    .tab-btn.add-tab:hover { color: #94a3b8; border-color: #64748b; }

    .roster-name-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    input[type="text"], input[type="url"], input[type="number"] {
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus { outline: none; border-color: #3b82f6; }

    .roster-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
    }

    .roster-textarea:focus { outline: none; border-color: #3b82f6; }

    .roster-hint {
      font-size: 11px;
      color: #475569;
      margin-top: 6px;
      margin-bottom: 14px;
    }

    .slides-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .slides-hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    /* ── Picker ── */
    .pick-result {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #fbbf24;
      min-height: 34px;
      margin-bottom: 12px;
    }

    .pick-result.empty { color: #334155; font-weight: 400; font-size: 14px; }

    .pick-controls { display: flex; gap: 8px; margin-bottom: 14px; }

    /* ── Pick Stats ── */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
    }

    .stats-name {
      width: 120px;
      flex-shrink: 0;
      font-size: 13px;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats-bar-wrap {
      flex: 1;
      height: 6px;
      background: #0f172a;
      border-radius: 3px;
      overflow: hidden;
    }

    .stats-bar {
      height: 100%;
      background: #7c3aed;
      border-radius: 3px;
      transition: width 0.4s;
    }

    .stats-count {
      width: 26px;
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* ── Grade Book ── */
    .gb-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .gb-class-label {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-top: 2px;
    }

    .gb-scroll {
      overflow-x: auto;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .gb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }

    .gb-table th {
      padding: 8px 10px;
      background: #0f172a;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #334155;
      text-align: center;
    }

    .gb-table td {
      padding: 3px 6px;
      border: 1px solid #1e293b;
      text-align: center;
    }

    .gb-table tbody tr:hover td { background: rgba(255,255,255,0.03); }

    .gb-name-th { text-align: left !important; min-width: 130px; }
    .gb-name-td { text-align: left !important; color: #e2e8f0; padding: 6px 10px !important; }

    .gb-col-header { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .gb-col-name { color: #94a3b8; }
    .gb-col-max  { font-size: 10px; color: #475569; font-weight: 400; }

    .gb-col-top { display: flex; align-items: center; gap: 4px; }

    .gb-del-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 11px;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.15s;
      line-height: 1;
    }

    .gb-del-btn:hover { color: #ef4444; }

    .gb-input {
      width: 56px;
      padding: 5px 4px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      font-family: inherit;
    }

    .gb-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: #0f172a;
      color: #e2e8f0;
    }

    .gb-empty {
      text-align: center;
      padding: 24px;
      color: #475569;
      font-size: 13px;
    }

    /* ── Saving indicator ── */
    .save-status {
      font-size: 11px;
      color: #475569;
      text-align: right;
      margin-top: 6px;
      min-height: 16px;
      transition: opacity 0.5s;
    }

    .save-status.saved { color: #22c55e; }

    /* ── Quick Grade Modal ── */
    .qg-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .qg-overlay.open { display: flex; }

    .qg-modal {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .qg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
    }

    .qg-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .qg-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .qg-close:hover { color: #f8fafc; }

    .qg-list {
      overflow-y: auto;
      padding: 8px 12px;
      flex: 1;
    }

    .qg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      gap: 12px;
    }

    .qg-row:hover { background: #0f172a; }

    .qg-name {
      font-size: 15px;
      color: #e2e8f0;
      flex: 1;
    }

    .qg-grade {
      font-size: 18px;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      color: #fbbf24;
    }

    .qg-grade.empty { color: #334155; font-size: 14px; }

    .qg-footer {
      padding: 12px 20px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <h1><span class="dot" id="dot"></span>Control Center</h1>

  <div class="sections">

    <!-- Timer -->
    <div class="card">
      <div class="card-title">Timer</div>
      <div class="timer-display entry" id="timerDisplay">0:00</div>
      <div class="numpad">
        <button class="numpad-btn" onclick="numpadPress(1)">1</button>
        <button class="numpad-btn" onclick="numpadPress(2)">2</button>
        <button class="numpad-btn" onclick="numpadPress(3)">3</button>
        <button class="numpad-btn" onclick="numpadPress(4)">4</button>
        <button class="numpad-btn" onclick="numpadPress(5)">5</button>
        <button class="numpad-btn" onclick="numpadPress(6)">6</button>
        <button class="numpad-btn" onclick="numpadPress(7)">7</button>
        <button class="numpad-btn" onclick="numpadPress(8)">8</button>
        <button class="numpad-btn" onclick="numpadPress(9)">9</button>
        <button class="numpad-btn del-btn" onclick="numpadBackspace()">⌫</button>
        <button class="numpad-btn" onclick="numpadPress(0)">0</button>
        <button class="numpad-btn clr-btn" onclick="numpadClear()">CLR</button>
      </div>
      <div class="timer-controls">
        <button class="btn btn-green" id="startPauseBtn" onclick="toggleTimer()">Start</button>
        <button class="btn btn-gray"  onclick="clearTimer()">Clear</button>
      </div>
    </div>

    <!-- Student Picker -->
    <div class="card">
      <div class="card-title">Classes &amp; Students</div>

      <div class="roster-tabs" id="rosterTabs"></div>

      <div class="roster-name-row">
        <input type="text" id="rosterNameInput" placeholder="Class name (e.g. Period 3)" style="flex:1;">
        <button class="btn btn-gray" style="flex:none;padding:8px 14px;font-size:13px;" onclick="renameCurrentRoster()">Rename</button>
        <button class="btn btn-red"  style="flex:none;padding:8px 12px;font-size:13px;" onclick="deleteCurrentRoster()">✕</button>
      </div>

      <textarea class="roster-textarea" id="rosterTextarea"
        placeholder="Enter student names, one per line"></textarea>
      <div class="roster-hint">One name per line — changes save automatically.</div>

      <!-- Per-roster slides -->
      <div class="slides-row">
        <input type="url" id="slidesInput" placeholder="Google Slides URL for this class…" style="flex:1;">
        <button class="btn btn-blue" style="flex:none;padding:12px 16px;" onclick="pushSlides()">Push to Display</button>
      </div>
      <div class="slides-hint">
        Paste any share or embed URL — or the full &lt;iframe&gt; from
        <strong style="color:#64748b">File → Share → Publish to web → Embed</strong>
      </div>

      <div class="pick-result empty" id="pickResult">—</div>

      <div class="pick-controls">
        <button class="btn btn-purple" onclick="pickRandom()">Pick Random</button>
        <button class="btn btn-gray"   onclick="clearPick()">Clear</button>
        <button class="btn btn-teal"   onclick="openQuickGrade()">Quick Grade</button>
      </div>

      <div class="save-status" id="saveStatus"></div>

      <div style="border-top:1px solid #1e293b;margin-top:14px;padding-top:14px;">
        <div class="card-title" style="margin-bottom:10px">Pick Stats</div>
        <div id="statsContainer"></div>
      </div>
    </div>

    <!-- Grade Book -->
    <div class="card">
      <div class="gb-header-row">
        <div>
          <div class="card-title" style="margin-bottom:2px">Grade Book</div>
          <div class="gb-class-label" id="gbClassName"></div>
        </div>
        <button class="btn btn-gray" style="flex:none;padding:8px 14px;font-size:13px;" onclick="addAssignment()">+ Assignment</button>
      </div>
      <div class="gb-scroll">
        <table class="gb-table" id="gbTable">
          <thead><tr id="gbThead"></tr></thead>
          <tbody id="gbTbody"></tbody>
        </table>
      </div>
      <div class="save-status" id="gbSaveStatus"></div>
    </div>

  </div>

  <!-- Quick Grade Modal -->
  <div class="qg-overlay" id="qgOverlay" onclick="qgOverlayClick(event)">
    <div class="qg-modal">
      <div class="qg-header">
        <span class="qg-title">Quick Grade</span>
        <button class="qg-close" onclick="closeQuickGrade()">✕</button>
      </div>
      <div class="qg-list" id="qgList"></div>
      <div class="qg-footer">
        <button class="btn btn-gray" style="font-size:13px;" onclick="clearAllQuickGrades()">Clear All</button>
        <button class="btn btn-teal" style="font-size:13px;" onclick="closeQuickGrade()">Done</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const dot = document.getElementById('dot');
    socket.on('connect',    () => dot.classList.remove('disconnected'));
    socket.on('disconnect', () => dot.classList.add('disconnected'));

    // ── Timer ──────────────────────────────────────────────
    let timerRemaining = 0;
    let timerDuration  = 0;
    let timerRunning   = false;

    // Numpad state: 6-digit buffer [H2,H1,M2,M1,S2,S1]
    let numpadBuf = [0,0,0,0,0,0];
    let numpadActive = false; // user has started entering digits

    const timerDisplay  = document.getElementById('timerDisplay');
    const startPauseBtn = document.getElementById('startPauseBtn');

    function fmt(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function numpadToSeconds() {
      const [h2,h1,m2,m1,s2,s1] = numpadBuf;
      return (h2*10+h1)*3600 + (m2*10+m1)*60 + (s2*10+s1);
    }

    function numpadFmt() {
      const [h2,h1,m2,m1,s2,s1] = numpadBuf;
      const hh = h2*10+h1, mm = m2*10+m1, ss = s2*10+s1;
      if (hh > 0) return `${hh}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      return `${mm}:${String(ss).padStart(2,'0')}`;
    }

    function numpadPress(d) {
      numpadBuf = [...numpadBuf.slice(1), d];
      numpadActive = true;
      updateTimerDisplay();
    }

    function numpadBackspace() {
      numpadBuf = [0, ...numpadBuf.slice(0, 5)];
      if (numpadBuf.every(x => x === 0)) numpadActive = false;
      updateTimerDisplay();
    }

    function numpadClear() {
      numpadBuf = [0,0,0,0,0,0];
      numpadActive = false;
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      if (numpadActive && !timerRunning) {
        timerDisplay.textContent = numpadFmt();
        timerDisplay.className = 'timer-display entry';
        return;
      }
      timerDisplay.textContent = fmt(timerRemaining);
      timerDisplay.className = 'timer-display';
      const pct = timerDuration > 0 ? timerRemaining / timerDuration : 1;
      if      (pct <= 0.1)  timerDisplay.classList.add('urgent');
      else if (pct <= 0.25) timerDisplay.classList.add('warning');
    }

    function toggleTimer() {
      if (timerRunning) {
        socket.emit('timer:pause');
      } else if (numpadActive) {
        const secs = numpadToSeconds();
        if (secs > 0) {
          numpadActive = false;
          numpadBuf = [0,0,0,0,0,0];
          socket.emit('timer:set-start', secs);
        }
      } else {
        if (timerRemaining > 0) socket.emit('timer:start');
      }
    }

    function clearTimer() {
      numpadClear();
      socket.emit('timer:reset');
    }

    socket.on('state', (s) => {
      timerDuration  = s.timer.duration;
      timerRemaining = s.timer.remaining;
      timerRunning   = s.timer.running;
      updateTimerDisplay();
      startPauseBtn.textContent = timerRunning ? 'Pause' : 'Start';
      initRosters(s.rosters, s.activeRosterId);
    });

    socket.on('timer:update', (t) => {
      timerDuration  = t.duration;
      timerRemaining = t.remaining;
      timerRunning   = t.running;
      updateTimerDisplay();
      startPauseBtn.textContent = timerRunning ? 'Pause' : 'Start';
    });

    socket.on('timer:tick', (remaining) => {
      timerRemaining = remaining;
      updateTimerDisplay();
    });

    socket.on('timer:done', () => {
      timerRunning = false;
      startPauseBtn.textContent = 'Start';
      updateTimerDisplay();
    });

    // ── Rosters ────────────────────────────────────────────
    let rosters  = {};
    let activeId = null;
    let saveTimer = null;

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function fullNameClient(s) {
      if (!s) return '';
      if (s.firstName || s.lastName) return [s.firstName, s.lastName].filter(Boolean).join(' ');
      return s.name || '';
    }

    function parseStudentsClient(raw) {
      if (!raw) return [];
      const base = { firstName:'', lastName:'', present:true, picks:0, quickGrade:'' };
      try {
        const p = JSON.parse(raw);
        if (Array.isArray(p)) return p.map(s => {
          if (typeof s === 'string') {
            const w = s.trim().split(/\s+/);
            return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' ') };
          }
          if (s.name && !s.firstName) {
            const w = (s.name||'').trim().split(/\s+/);
            return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' '), ...s };
          }
          return { ...base, ...s };
        });
      } catch {}
      return raw.split('\n').map(s => s.trim()).filter(Boolean).map(name => {
        const w = name.split(/\s+/);
        return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' ') };
      });
    }

    function renderStats() {
      const container = document.getElementById('statsContainer');
      const r = rosters[activeId];
      if (!r) { container.innerHTML = ''; return; }
      const students = parseStudentsClient(r.students);
      if (students.length === 0) {
        container.innerHTML = '<p style="color:#475569;font-size:13px">No students yet.</p>';
        return;
      }
      const sorted = [...students].sort((a, b) => (b.picks || 0) - (a.picks || 0));
      const maxPicks = Math.max(1, ...sorted.map(s => s.picks || 0));
      container.innerHTML = sorted.map(s => {
        const p = s.picks || 0;
        const name = fullNameClient(s);
        return `<div class="stats-row">
          <span class="stats-name">${escHtml(name)}</span>
          <div class="stats-bar-wrap"><div class="stats-bar" style="width:${(p / maxPicks * 100).toFixed(1)}%"></div></div>
          <span class="stats-count">${p}</span>
        </div>`;
      }).join('');
    }

    function initRosters(data, serverId) {
      rosters  = data || {};
      activeId = (serverId && rosters[serverId]) ? serverId : Object.keys(rosters)[0];
      if (activeId) socket.emit('roster:activate', activeId);
      renderTabs();
      renderCurrentRoster();
      loadGradebook(activeId);
      renderStats();
    }

    function renderTabs() {
      const container = document.getElementById('rosterTabs');
      container.innerHTML = '';
      Object.entries(rosters).forEach(([id, r]) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (id === activeId ? ' active' : '');
        btn.textContent = r.name;
        btn.onclick = () => switchRoster(id);
        container.appendChild(btn);
      });
      const add = document.createElement('button');
      add.className = 'tab-btn add-tab';
      add.textContent = '+ New';
      add.onclick = addRoster;
      container.appendChild(add);
    }

    function renderCurrentRoster() {
      const r = rosters[activeId];
      if (!r) return;
      document.getElementById('rosterNameInput').value = r.name;
      // Show names one-per-line (hide raw JSON from user)
      const students = parseStudentsClient(r.students);
      document.getElementById('rosterTextarea').value =
        students.map(s => fullNameClient(s)).join('\n');
      document.getElementById('slidesInput').value = r.slidesUrl || '';
    }

    function switchRoster(id) {
      activeId = id;
      socket.emit('roster:activate', id);
      renderTabs();
      renderCurrentRoster();
      loadGradebook(id);
      renderStats();
    }

    function addRoster() {
      const id = uid();
      const n  = Object.keys(rosters).length + 1;
      rosters[id] = { name: `Period ${n}`, students: '[]', slidesUrl: '' };
      activeId = id;
      socket.emit('roster:activate', id);
      saveCurrentRoster();
      renderTabs();
      renderCurrentRoster();
    }

    function renameCurrentRoster() {
      const name = document.getElementById('rosterNameInput').value.trim();
      if (!name) return;
      rosters[activeId].name = name;
      saveCurrentRoster();
      renderTabs();
    }

    function deleteCurrentRoster() {
      if (Object.keys(rosters).length <= 1) return;
      socket.emit('roster:delete', activeId);
    }

    function buildStudentsJson() {
      // Merge textarea names back into existing student objects (preserve flags/picks)
      const rawLines = document.getElementById('rosterTextarea').value
        .split('\n').map(s => s.trim()).filter(Boolean);
      const existing = parseStudentsClient(rosters[activeId]?.students || '[]');
      const base = { firstName:'', lastName:'', present:true, picks:0, quickGrade:'' };

      // Build lookup by full name
      const byName = {};
      existing.forEach(s => { byName[fullNameClient(s)] = s; });

      return JSON.stringify(rawLines.map(name => {
        const old = byName[name];
        if (old) return old; // preserve existing student data
        const w = name.split(/\s+/);
        return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' ') };
      }));
    }

    function saveCurrentRoster() {
      const r = rosters[activeId];
      if (!r) return;
      const typedName = document.getElementById('rosterNameInput').value.trim();
      if (typedName) r.name = typedName;
      r.students  = buildStudentsJson();
      r.slidesUrl = document.getElementById('slidesInput').value.trim();
      socket.emit('roster:save', { id: activeId, ...r });
    }

    function scheduleSave() {
      const status = document.getElementById('saveStatus');
      status.textContent = 'Saving…';
      status.className = 'save-status';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveCurrentRoster();
        status.textContent = 'Saved';
        status.className = 'save-status saved';
        setTimeout(() => { status.textContent = ''; }, 2000);
      }, 800);
    }

    document.getElementById('rosterTextarea').addEventListener('input', scheduleSave);
    document.getElementById('slidesInput').addEventListener('input', scheduleSave);

    socket.on('roster:all', (data) => {
      const prev = activeId;
      rosters  = data;
      activeId = data[prev] ? prev : Object.keys(data)[0];
      renderTabs();
      renderCurrentRoster();
      loadGradebook(activeId);
      renderStats();
    });

    socket.on('roster:activated', ({ id }) => {
      if (id && rosters[id] && id !== activeId) {
        activeId = id;
        renderTabs();
        renderCurrentRoster();
        loadGradebook(id);
        renderStats();
      }
    });

    socket.on('pick:stats', ({ rosterId, students }) => {
      if (rosters[rosterId]) {
        rosters[rosterId].students = students;
        if (rosterId === activeId) renderStats();
      }
    });

    // ── Slides ─────────────────────────────────────────────
    function toEmbedUrl(raw) {
      const srcMatch = raw.match(/src=["']([^"']+)["']/);
      if (srcMatch) raw = srcMatch[1];
      if (raw.includes('/embed')) return raw;
      const pubMatch = raw.match(/\/presentation\/d\/e\/([^/?#]+)/);
      if (pubMatch) return `https://docs.google.com/presentation/d/e/${pubMatch[1]}/embed`;
      const docMatch = raw.match(/\/presentation\/d\/([^/?#]+)/);
      if (docMatch) return `https://docs.google.com/presentation/d/${docMatch[1]}/embed`;
      return raw;
    }

    function pushSlides() {
      const raw = document.getElementById('slidesInput').value.trim();
      if (!raw) return;
      const url = toEmbedUrl(raw);
      document.getElementById('slidesInput').value = url;
      if (rosters[activeId]) {
        rosters[activeId].slidesUrl = url;
        saveCurrentRoster();
      }
      socket.emit('slides:push', url);
    }

    // ── Picker ─────────────────────────────────────────────
    function pickRandom() { socket.emit('pick:random'); }

    function clearPick() {
      const el = document.getElementById('pickResult');
      if (el.classList.contains('empty')) {
        socket.emit('pick:reset-stats');
      } else {
        socket.emit('pick:clear');
      }
    }

    socket.on('pick:show', (name) => {
      const el = document.getElementById('pickResult');
      el.textContent = name;
      el.className = 'pick-result';
    });

    socket.on('pick:clear', () => {
      const el = document.getElementById('pickResult');
      el.textContent = '—';
      el.className = 'pick-result empty';
    });

    socket.on('pick:error', (msg) => {
      const el = document.getElementById('pickResult');
      el.textContent = msg;
      el.className = 'pick-result empty';
    });

    socket.on('roster:error', (msg) => {
      const status = document.getElementById('saveStatus');
      status.textContent = '⚠ ' + msg;
      status.className = 'save-status';
      status.style.color = '#f87171';
    });

    // ── Quick Grade ────────────────────────────────────────
    const QG_STATES = ['', '✓', '✓+', '✓–'];

    // quickGrades stored inside gbData.quickGrades = { studentName: stateIndex }
    function getQuickGrades() {
      return gbData.quickGrades || {};
    }

    function openQuickGrade() {
      const r = rosters[activeId];
      if (!r) return;
      const students = parseStudentsClient(r.students).filter(s => s.present !== false);
      const qg = getQuickGrades();
      const list = document.getElementById('qgList');
      list.innerHTML = students.map((s, i) => {
        const name = fullNameClient(s);
        const idx = qg[name] || 0;
        return `<div class="qg-row" data-name="${escAttr(name)}" onclick="qgToggle(this)">
          <span class="qg-name">${escHtml(name)}</span>
          <span class="qg-grade${idx === 0 ? ' empty' : ''}">${QG_STATES[idx] || ''}</span>
        </div>`;
      }).join('');
      document.getElementById('qgOverlay').classList.add('open');
    }

    function closeQuickGrade() {
      document.getElementById('qgOverlay').classList.remove('open');
    }

    function qgOverlayClick(e) {
      if (e.target === document.getElementById('qgOverlay')) closeQuickGrade();
    }

    function qgToggle(rowEl) {
      const name = rowEl.dataset.name;
      const qg   = getQuickGrades();
      const cur  = qg[name] || 0;
      const next = (cur + 1) % QG_STATES.length;
      if (next === 0) delete qg[name];
      else qg[name] = next;
      gbData.quickGrades = qg;

      const gradeEl = rowEl.querySelector('.qg-grade');
      gradeEl.textContent = QG_STATES[next] || '';
      gradeEl.className = 'qg-grade' + (next === 0 ? ' empty' : '');

      scheduleGbSave();
    }

    function clearAllQuickGrades() {
      gbData.quickGrades = {};
      // Re-render all rows
      document.querySelectorAll('.qg-row').forEach(row => {
        const gradeEl = row.querySelector('.qg-grade');
        gradeEl.textContent = '';
        gradeEl.className = 'qg-grade empty';
      });
      scheduleGbSave();
    }

    // ── Grade Book ─────────────────────────────────────────
    let gbData     = { columns: [], rows: {}, quickGrades: {} };
    let gbSaveTimer = null;

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(s) {
      return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function parseStudentsForGb(raw) {
      if (!raw) return [];
      try {
        const p = JSON.parse(raw);
        if (Array.isArray(p)) return p.filter(s => s.present !== false).map(s => fullNameClient(s));
      } catch {}
      return raw.split('\n').map(s => s.trim()).filter(Boolean);
    }

    function loadGradebook(rosterId) {
      const r = rosters[rosterId];
      document.getElementById('gbClassName').textContent = r ? r.name : '';
      if (!r) { gbData = { columns: [], rows: {}, quickGrades: {} }; renderGradebook([]); return; }
      try {
        gbData = JSON.parse(r.grades || '{}');
        if (!gbData.columns)     gbData.columns     = [];
        if (!gbData.rows)        gbData.rows        = {};
        if (!gbData.quickGrades) gbData.quickGrades = {};
      } catch { gbData = { columns: [], rows: {}, quickGrades: {} }; }
      renderGradebook(parseStudentsForGb(r.students));
    }

    function renderGradebook(students) {
      if (!students) students = parseStudentsForGb(rosters[activeId]?.students || '[]');
      const thead = document.getElementById('gbThead');
      const tbody = document.getElementById('gbTbody');

      let thHtml = '<th class="gb-name-th">Student</th>';
      gbData.columns.forEach(col => {
        thHtml += `<th>
          <div class="gb-col-header">
            <div class="gb-col-top">
              <span class="gb-col-name">${escHtml(col.name)}</span>
              <button class="gb-del-btn" onclick="deleteAssignment('${col.id}')" title="Remove">✕</button>
            </div>
            <span class="gb-col-max">/ ${col.max || 100}</span>
          </div>
        </th>`;
      });
      thead.innerHTML = thHtml;

      tbody.innerHTML = '';
      if (students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${gbData.columns.length + 1}" class="gb-empty">No students in this class.</td></tr>`;
        return;
      }
      students.forEach(name => {
        const tr = document.createElement('tr');
        const nameTd = document.createElement('td');
        nameTd.className = 'gb-name-td';
        nameTd.textContent = name;
        tr.appendChild(nameTd);
        gbData.columns.forEach(col => {
          const td = document.createElement('td');
          const input = document.createElement('input');
          input.className = 'gb-input';
          input.type = 'text';
          input.value = gbData.rows[name]?.[col.id] ?? '';
          input.placeholder = '—';
          input.addEventListener('input', () => {
            if (!gbData.rows[name]) gbData.rows[name] = {};
            gbData.rows[name][col.id] = input.value;
            scheduleGbSave();
          });
          td.appendChild(input);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function addAssignment() {
      const name = prompt('Assignment name:');
      if (!name?.trim()) return;
      const maxStr = prompt('Max score:', '100');
      const max = parseInt(maxStr) || 100;
      const id = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      gbData.columns.push({ id, name: name.trim(), max });
      renderGradebook();
      scheduleGbSave();
    }

    function deleteAssignment(colId) {
      if (!confirm('Remove this assignment column?')) return;
      gbData.columns = gbData.columns.filter(c => c.id !== colId);
      Object.values(gbData.rows).forEach(r => delete r[colId]);
      renderGradebook();
      scheduleGbSave();
    }

    function scheduleGbSave() {
      const status = document.getElementById('gbSaveStatus');
      status.textContent = 'Saving…';
      status.className = 'save-status';
      clearTimeout(gbSaveTimer);
      gbSaveTimer = setTimeout(() => {
        socket.emit('grades:save', { id: activeId, grades: JSON.stringify(gbData) });
        if (rosters[activeId]) rosters[activeId].grades = JSON.stringify(gbData);
        status.textContent = 'Saved';
        status.className = 'save-status saved';
        setTimeout(() => { status.textContent = ''; }, 2000);
      }, 800);
    }
  </script>
</body>
</html>

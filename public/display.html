<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f8fafc;
      user-select: none;
    }

    /* ── Slides (4:3, centered) ── */
    .slides-bg {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }

    .slides-inner {
      width: min(100vw, calc(100vh * 4 / 3));
      height: min(100vh, calc(100vw * 3 / 4));
      position: relative;
      background: #111;
    }

    .slides-inner iframe { width: 100%; height: 100%; border: none; }

    .slides-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .slides-placeholder svg { width: 56px; height: 56px; opacity: 0.2; }
    .slides-placeholder p { font-size: 15px; color: #334155; }

    /* ── Widget base ── */
    .widget {
      position: fixed;
      z-index: 10;
      width: 218px;
      background: rgba(15, 23, 42, 0.93);
      border: 1px solid rgba(51, 65, 85, 0.7);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: box-shadow 0.15s;
    }

    .widget.dragging { box-shadow: 0 20px 60px rgba(0,0,0,0.7); }

    .widget-handle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 9px;
      cursor: grab;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      border-radius: 16px 16px 0 0;
    }

    .widget-handle:active { cursor: grabbing; }

    .grip {
      display: grid;
      grid-template-columns: repeat(3, 3px);
      grid-template-rows: repeat(2, 3px);
      gap: 2.5px;
    }

    .grip span { width: 3px; height: 3px; border-radius: 50%; background: #475569; }

    .widget-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
    }

    .widget-body { padding: 14px; }

    /* ── Timer widget ── */
    .timer-tap {
      text-align: center;
      cursor: pointer;
      padding: 10px 6px 6px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .timer-tap:hover { background: rgba(255,255,255,0.06); }

    .timer-num {
      font-size: 56px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      line-height: 1;
      color: #f8fafc;
      transition: color 0.4s;
    }

    .timer-num.warning { color: #fbbf24; }
    .timer-num.urgent  { color: #f87171; }

    .timer-hint {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #475569;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }

    .pbtn {
      padding: 7px 0;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .pbtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .timer-row2 { display: flex; gap: 6px; }

    .cbtn {
      flex: 1;
      padding: 8px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cbtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .rbtn {
      padding: 8px 13px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rbtn:hover { background: #334155; color: #e2e8f0; }

    .custom-row {
      display: none;
      gap: 5px;
      align-items: center;
      margin-top: 8px;
    }

    .custom-row.open { display: flex; }

    .custom-row input {
      width: 52px;
      padding: 7px 4px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
      text-align: center;
      font-family: inherit;
    }

    .custom-row input:focus { outline: none; border-color: #3b82f6; }
    .custom-row .sep { color: #475569; font-weight: 700; font-size: 16px; }

    .set-btn {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .set-btn:hover { background: #1d4ed8; }

    /* ── Picker widget ── */
    .pick-display {
      min-height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .pick-sub {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 4px;
    }

    .pick-name {
      font-size: 26px;
      font-weight: 800;
      color: #fbbf24;
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
    }

    .pick-name.visible { opacity: 1; transform: scale(1); }

    .pick-name.pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }

    .pick-btns { display: flex; gap: 8px; }

    .pbtn-pick {
      flex: 1;
      padding: 11px;
      border-radius: 9px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pbtn-pick.purple { background: #7c3aed; color: #fff; }
    .pbtn-pick.purple:hover { background: #6d28d9; }
    .pbtn-pick.gray   { background: #334155; color: #e2e8f0; }
    .pbtn-pick.gray:hover   { background: #475569; }

    /* ── Class widget ── */
    .class-name-big {
      font-size: 20px;
      font-weight: 800;
      color: #e2e8f0;
      text-align: center;
      padding: 8px 6px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .class-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cnav-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .cnav-btn:hover:not(:disabled) { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .cnav-btn:disabled { opacity: 0.25; cursor: default; }

    .class-pos {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.06em;
    }

    /* ── Timer progress bar ── */
    .timer-bar-wrap {
      height: 5px;
      background: #1e293b;
      border-radius: 3px;
      margin: 6px 2px 10px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      border-radius: 3px;
      background: #3b82f6;
      width: 100%;
    }

    /* ── Add-time row ── */
    .timer-add-row { display: flex; gap: 5px; margin-top: 0; margin-bottom: 6px; }

    .abtn {
      flex: 1;
      padding: 7px 0;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .abtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Deck counter ── */
    .deck-info {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #334155;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── Attendance open button ── */
    .att-open-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .att-open-btn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Attendance modal ── */
    .att-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .att-overlay.open { display: flex; }

    .att-modal {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      width: min(420px, 92vw);
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.85);
    }

    .att-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #1e293b;
    }

    .att-title { font-size: 16px; font-weight: 800; color: #f8fafc; }
    .att-sub   { font-size: 12px; color: #475569; margin-top: 2px; }

    .att-close {
      background: #1e293b;
      border: none;
      color: #64748b;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .att-close:hover { background: #334155; color: #e2e8f0; }

    .att-list {
      overflow-y: auto;
      padding: 12px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .att-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: filter 0.12s;
      user-select: none;
    }

    .att-row.present { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); }
    .att-row.absent  { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
    .att-row:hover   { filter: brightness(1.15); }

    .att-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }

    .att-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 6px;
    }

    .att-badge.present { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .att-badge.absent  { background: rgba(239,68,68,0.15); color: #f87171; }

    .att-footer {
      padding: 14px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
    }

    .att-all-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .att-all-btn:hover { background: #334155; color: #e2e8f0; }

    .att-save-btn {
      flex: 2;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .att-save-btn:hover { background: #1d4ed8; }

    /* ── Timer done overlay ── */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      animation: pulse-ring 1s ease-in-out infinite alternate;
    }

    .done-overlay.show { display: block; }

    @keyframes pulse-ring {
      from { box-shadow: inset 0 0 0 6px rgba(239,68,68,0.5); }
      to   { box-shadow: inset 0 0 0 22px rgba(239,68,68,0.9); }
    }
  </style>
</head>
<body>

<div class="done-overlay" id="doneOverlay"></div>

<!-- Slides -->
<div class="slides-bg">
  <div class="slides-inner" id="slidesInner">
    <div class="slides-placeholder" id="slidesPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Waiting for slides…</p>
    </div>
  </div>
</div>

<!-- Class Widget -->
<div class="widget" id="classWidget">
  <div class="widget-handle" id="classHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Class</div>
  </div>
  <div class="widget-body">
    <div class="class-name-big" id="classNameBig">—</div>
    <div class="class-nav">
      <button class="cnav-btn" id="classPrevBtn" onclick="prevClass()">‹</button>
      <div class="class-pos" id="classPos">— / —</div>
      <button class="cnav-btn" id="classNextBtn" onclick="nextClass()">›</button>
    </div>
    <button class="att-open-btn" onclick="openAttendance()">Attendance</button>
  </div>
</div>

<!-- Timer Widget -->
<div class="widget" id="timerWidget">
  <div class="widget-handle" id="timerHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Timer</div>
  </div>
  <div class="widget-body">
    <div class="timer-tap" onclick="toggleTimer()">
      <div class="timer-num" id="timerNum">5:00</div>
      <div class="timer-hint" id="timerHint">Tap to start</div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="timer-add-row">
      <button class="abtn" onclick="addTime(30)">+30s</button>
      <button class="abtn" onclick="addTime(60)">+1m</button>
      <button class="abtn" onclick="addTime(300)">+5m</button>
      <button class="abtn" onclick="addTime(600)">+10m</button>
    </div>
    <div class="timer-row2">
      <button class="cbtn" onclick="toggleCustom()">Custom</button>
      <button class="rbtn" onclick="resetTimer()">↺</button>
    </div>
    <div class="custom-row" id="customRow">
      <input type="number" id="cMin" placeholder="min" min="0" max="99">
      <span class="sep">:</span>
      <input type="number" id="cSec" placeholder="sec" min="0" max="59">
      <button class="set-btn" onclick="setCustom()">Set</button>
    </div>
  </div>
</div>

<!-- Picker Widget -->
<div class="widget" id="pickerWidget">
  <div class="widget-handle" id="pickerHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Students</div>
  </div>
  <div class="widget-body">
    <div class="pick-display">
      <div class="pick-sub" id="pickSub" style="visibility:hidden">Called On</div>
      <div class="pick-name" id="pickName"></div>
    </div>
    <div class="deck-info" id="deckInfo"></div>
    <div class="pick-btns">
      <button class="pbtn-pick purple" onclick="pickRandom()">Pick</button>
      <button class="pbtn-pick gray"   onclick="clearPick()">Clear</button>
    </div>
  </div>
</div>

<!-- Attendance Modal -->
<div class="att-overlay" id="attOverlay">
  <div class="att-modal">
    <div class="att-header">
      <div>
        <div class="att-title">Attendance</div>
        <div class="att-sub" id="attSub"></div>
      </div>
      <button class="att-close" onclick="closeAttendance()">✕</button>
    </div>
    <div class="att-list" id="attList"></div>
    <div class="att-footer">
      <button class="att-all-btn" onclick="markAllPresent()">All Present</button>
      <button class="att-save-btn" onclick="saveAttendance()">Save &amp; Close</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // ── Class roster state ─────────────────────────────────────
  let allRosters    = {};
  let rosterIds     = [];
  let activeRosterId = null;

  function updateClassWidget() {
    const name = allRosters[activeRosterId]?.name || '—';
    document.getElementById('classNameBig').textContent = name;
    const idx   = rosterIds.indexOf(activeRosterId);
    const total = rosterIds.length;
    document.getElementById('classPos').textContent = total > 0 ? `${idx + 1} / ${total}` : '— / —';
    document.getElementById('classPrevBtn').disabled = idx <= 0;
    document.getElementById('classNextBtn').disabled = idx >= total - 1;
  }

  function prevClass() {
    const idx = rosterIds.indexOf(activeRosterId);
    if (idx > 0) socket.emit('roster:activate', rosterIds[idx - 1]);
  }

  function nextClass() {
    const idx = rosterIds.indexOf(activeRosterId);
    if (idx < rosterIds.length - 1) socket.emit('roster:activate', rosterIds[idx + 1]);
  }

  // ── Drag & drop ────────────────────────────────────────────
  const POS_KEY = 'croom_widget_pos_v1';

  function loadPos() {
    try { return JSON.parse(localStorage.getItem(POS_KEY)) || {}; } catch { return {}; }
  }

  function savePos(key, x, y) {
    const p = loadPos();
    p[key] = { x, y };
    localStorage.setItem(POS_KEY, JSON.stringify(p));
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function placeWidget(el, x, y) {
    const mx = window.innerWidth  - el.offsetWidth;
    const my = window.innerHeight - el.offsetHeight;
    el.style.left = clamp(x, 0, mx) + 'px';
    el.style.top  = clamp(y, 0, my) + 'px';
  }

  function makeDraggable(el, handle, key, defaultX, defaultY) {
    const saved = loadPos()[key];
    placeWidget(el, saved ? saved.x : defaultX, saved ? saved.y : defaultY);

    let active = false, ox, oy, sx, sy;

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      active = true; sx = e.clientX; sy = e.clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      el.classList.add('dragging');
    });

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      active = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      el.classList.add('dragging');
    }, { passive: false });

    document.addEventListener('mousemove', e => {
      if (!active) return;
      placeWidget(el, ox + e.clientX - sx, oy + e.clientY - sy);
    });

    document.addEventListener('touchmove', e => {
      if (!active) return;
      e.preventDefault();
      placeWidget(el, ox + e.touches[0].clientX - sx, oy + e.touches[0].clientY - sy);
    }, { passive: false });

    function end() {
      if (!active) return;
      active = false;
      el.classList.remove('dragging');
      savePos(key, parseInt(el.style.left), parseInt(el.style.top));
    }

    document.addEventListener('mouseup',  end);
    document.addEventListener('touchend', end);
  }

  window.addEventListener('load', () => {
    const tw = document.getElementById('timerWidget');
    const pw = document.getElementById('pickerWidget');
    const cw = document.getElementById('classWidget');
    const cy = Math.round((window.innerHeight - tw.offsetHeight) / 2);
    makeDraggable(tw, document.getElementById('timerHandle'),  'timer',  16, cy);
    makeDraggable(pw, document.getElementById('pickerHandle'), 'picker', window.innerWidth - pw.offsetWidth - 16, cy);
    makeDraggable(cw, document.getElementById('classHandle'),  'class',  Math.round((window.innerWidth - cw.offsetWidth) / 2), window.innerHeight - cw.offsetHeight - 16);
  });

  // ── Audio chime ────────────────────────────────────────────
  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[523.25, 0], [659.25, 0.28], [783.99, 0.56]].forEach(([freq, delay]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.22, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
        osc.start(t); osc.stop(t + 1.8);
      });
    } catch (_) {}
  }

  // ── Timer ──────────────────────────────────────────────────
  let dur = 300, rem = 300, running = false;

  const timerNum  = document.getElementById('timerNum');
  const timerHint = document.getElementById('timerHint');
  const doneOv    = document.getElementById('doneOverlay');

  function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  function renderTimer(remaining, duration, isRunning) {
    timerNum.textContent  = fmt(remaining);
    timerHint.textContent = isRunning ? 'Tap to pause' : (remaining === 0 ? "Time's up" : 'Tap to start');
    timerNum.classList.remove('warning', 'urgent');
    doneOv.classList.remove('show');
    const pct = duration > 0 ? remaining / duration : (remaining > 0 ? 1 : 0);
    const bar = document.getElementById('timerBar');
    bar.style.width = (pct * 100) + '%';
    bar.style.background = (pct <= 0.1) ? '#ef4444' : (pct <= 0.25) ? '#fbbf24' : '#3b82f6';
    if (remaining === 0)   { timerNum.classList.add('urgent');  doneOv.classList.add('show'); }
    else if (pct <= 0.1)   { timerNum.classList.add('urgent'); }
    else if (pct <= 0.25)  { timerNum.classList.add('warning'); }
  }

  function toggleTimer() { socket.emit(running ? 'timer:pause' : 'timer:start'); }
  function resetTimer()  { socket.emit('timer:reset'); }
  function setPreset(s)  { socket.emit('timer:set', s); }
  function addTime(s)    { socket.emit('timer:add', s); }

  let customOpen = false;
  function toggleCustom() {
    customOpen = !customOpen;
    document.getElementById('customRow').classList.toggle('open', customOpen);
  }

  function setCustom() {
    const m = parseInt(document.getElementById('cMin').value) || 0;
    const s = parseInt(document.getElementById('cSec').value) || 0;
    const total = m * 60 + s;
    if (total > 0) {
      socket.emit('timer:set', total);
      customOpen = false;
      document.getElementById('customRow').classList.remove('open');
    }
  }

  function updateDeckInfo(remaining, total) {
    const el = document.getElementById('deckInfo');
    if (!total) { el.textContent = ''; return; }
    el.textContent = remaining === 0 ? 'All called — reshuffling next' : `${remaining} of ${total} remaining`;
  }

  socket.on('state', s => {
    dur = s.timer.duration; rem = s.timer.remaining; running = s.timer.running;
    renderTimer(rem, dur, running);
    if (s.pick.name) showPick(s.pick.name, false);
    if (s.slides.url) loadSlides(s.slides.url);
    allRosters     = s.rosters || {};
    rosterIds      = Object.keys(allRosters);
    activeRosterId = s.activeRosterId;
    updateClassWidget();
    updateDeckInfo(s.deckRemaining, s.deckTotal);
  });

  socket.on('deck:update', ({ remaining, total }) => updateDeckInfo(remaining, total));

  socket.on('roster:all', data => {
    allRosters = data;
    rosterIds  = Object.keys(data);
    updateClassWidget();
  });

  socket.on('roster:activated', ({ id }) => {
    activeRosterId = id;
    updateClassWidget();
  });

  socket.on('timer:update', t => {
    dur = t.duration; rem = t.remaining; running = t.running;
    renderTimer(rem, dur, running);
  });

  socket.on('timer:tick', r => { rem = r; renderTimer(rem, dur, running); });

  socket.on('timer:done', () => {
    running = false;
    renderTimer(0, dur, false);
    playChime();
  });

  // ── Picker ──────────────────────────────────────────────────
  function pickRandom() { socket.emit('pick:random'); }
  function clearPick()  { socket.emit('pick:clear'); }

  const pickName = document.getElementById('pickName');
  const pickSub  = document.getElementById('pickSub');

  function showPick(name, animate = true) {
    pickSub.style.visibility = 'visible';
    pickName.classList.remove('pop', 'visible');
    void pickName.offsetWidth;
    pickName.textContent = name;
    pickName.classList.add(animate ? 'pop' : 'visible');
  }

  socket.on('pick:show', name => showPick(name, true));
  socket.on('pick:clear', () => {
    pickName.classList.remove('pop', 'visible');
    pickSub.style.visibility = 'hidden';
    setTimeout(() => { pickName.textContent = ''; }, 300);
  });

  // ── Slides ──────────────────────────────────────────────────
  function toEmbedUrl(url) {
    const m = url.match(/src=["']([^"']+)["']/);
    if (m) url = m[1];
    if (url.includes('/embed')) return url;
    const pub = url.match(/\/presentation\/d\/e\/([^/?#]+)/);
    if (pub) return `https://docs.google.com/presentation/d/e/${pub[1]}/embed`;
    const doc = url.match(/\/presentation\/d\/([^/?#]+)/);
    if (doc) return `https://docs.google.com/presentation/d/${doc[1]}/embed`;
    return url;
  }

  function loadSlides(url) {
    if (!url) return;
    let eu = toEmbedUrl(url);
    if (!eu.includes('?')) eu += '?start=false&loop=false&delayms=3000';
    const ph = document.getElementById('slidesPlaceholder');
    let iframe = document.querySelector('#slidesInner iframe');
    if (!iframe) {
      ph.style.display = 'none';
      iframe = document.createElement('iframe');
      iframe.allowFullscreen = true;
      document.getElementById('slidesInner').appendChild(iframe);
    }
    iframe.src = eu;
  }

  socket.on('slides:update', url => { if (url) loadSlides(url); });

  // ── Attendance ─────────────────────────────────────────────
  let attStudents = [];

  function parseRosterStudents(raw) {
    if (!raw) return [];
    try {
      const p = JSON.parse(raw);
      if (Array.isArray(p)) return p.map(s =>
        typeof s === 'string'
          ? { name: s, present: true, anchor: false, introvert: false, gender: '', conflict: '', distractor: false }
          : { ...s }
      );
    } catch {}
    return raw.split('\n').map(s => s.trim()).filter(Boolean)
      .map(name => ({ name, present: true, anchor: false, introvert: false, gender: '', conflict: '', distractor: false }));
  }

  function openAttendance() {
    const r = allRosters[activeRosterId];
    if (!r) return;
    attStudents = parseRosterStudents(r.students);
    document.getElementById('attSub').textContent = r.name;
    renderAttList();
    document.getElementById('attOverlay').classList.add('open');
  }

  function closeAttendance() {
    document.getElementById('attOverlay').classList.remove('open');
  }

  function renderAttList() {
    const list = document.getElementById('attList');
    list.innerHTML = '';
    attStudents.forEach((s, i) => {
      const present = s.present !== false;
      const row = document.createElement('div');
      row.className = 'att-row ' + (present ? 'present' : 'absent');
      row.innerHTML = `<span class="att-name">${s.name}</span><span class="att-badge ${present ? 'present' : 'absent'}">${present ? 'Present' : 'Absent'}</span>`;
      row.onclick = () => { attStudents[i].present = !attStudents[i].present; renderAttList(); };
      list.appendChild(row);
    });
  }

  function markAllPresent() {
    attStudents.forEach(s => s.present = true);
    renderAttList();
  }

  function saveAttendance() {
    const r = allRosters[activeRosterId];
    if (!r || !activeRosterId) return;
    const studentsJson = JSON.stringify(attStudents);
    socket.emit('roster:save', {
      id: activeRosterId,
      name: r.name,
      students: studentsJson,
      slidesUrl: r.slidesUrl || '',
      sortOrder: 0
    });
    allRosters[activeRosterId].students = studentsJson;
    closeAttendance();
  }
</script>
</body>
</html>

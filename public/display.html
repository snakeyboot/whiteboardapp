<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f8fafc;
      user-select: none;
    }

    /* ── Slides (4:3, centered) ── */
    .slides-bg {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }

    .slides-inner {
      width: min(100vw, calc(100vh * 4 / 3));
      height: min(100vh, calc(100vw * 3 / 4));
      position: relative;
      background: #111;
    }

    .slides-inner iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    .slides-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .slides-placeholder svg { width: 56px; height: 56px; opacity: 0.2; }
    .slides-placeholder p { font-size: 15px; color: #334155; }

    /* ── Widget base ── */
    .widget {
      position: fixed;
      z-index: 10;
      width: 218px;
      background: rgba(15, 23, 42, 0.93);
      border: 1px solid rgba(51, 65, 85, 0.7);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: box-shadow 0.15s;
    }

    .widget.dragging { box-shadow: 0 20px 60px rgba(0,0,0,0.7); }

    .widget-handle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 9px;
      cursor: grab;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      border-radius: 16px 16px 0 0;
    }

    .widget-handle:active { cursor: grabbing; }

    .grip {
      display: grid;
      grid-template-columns: repeat(3, 3px);
      grid-template-rows: repeat(2, 3px);
      gap: 2.5px;
    }

    .grip span { width: 3px; height: 3px; border-radius: 50%; background: #475569; }

    .widget-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
    }

    .widget-body { padding: 14px; }

    /* ── Timer widget ── */
    .timer-tap {
      text-align: center;
      cursor: pointer;
      padding: 10px 6px 6px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .timer-tap:hover { background: rgba(255,255,255,0.06); }

    .timer-num {
      font-size: 56px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      line-height: 1;
      color: #f8fafc;
      transition: color 0.4s;
    }

    .timer-num.warning { color: #fbbf24; }
    .timer-num.urgent  { color: #f87171; }

    .timer-hint {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #475569;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }

    .pbtn {
      padding: 7px 0;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .pbtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .timer-row2 { display: flex; gap: 6px; }

    .cbtn {
      flex: 1;
      padding: 8px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cbtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .rbtn {
      padding: 8px 13px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rbtn:hover { background: #334155; color: #e2e8f0; }

    .custom-row {
      display: none;
      gap: 5px;
      align-items: center;
      margin-top: 8px;
    }

    .custom-row.open { display: flex; }

    .custom-row input {
      width: 52px;
      padding: 7px 4px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
      text-align: center;
      font-family: inherit;
    }

    .custom-row input:focus { outline: none; border-color: #3b82f6; }
    .custom-row .sep { color: #475569; font-weight: 700; font-size: 16px; }

    .set-btn {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .set-btn:hover { background: #1d4ed8; }

    /* ── Picker widget ── */
    .pick-display {
      min-height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .pick-sub {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 4px;
    }

    .pick-name {
      font-size: 26px;
      font-weight: 800;
      color: #fbbf24;
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
    }

    .pick-name.visible { opacity: 1; transform: scale(1); }

    .pick-name.pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }

    .pick-btns { display: flex; gap: 8px; }

    .pbtn-pick {
      flex: 1;
      padding: 11px;
      border-radius: 9px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pbtn-pick.purple { background: #7c3aed; color: #fff; }
    .pbtn-pick.purple:hover { background: #6d28d9; }
    .pbtn-pick.gray   { background: #334155; color: #e2e8f0; }
    .pbtn-pick.gray:hover   { background: #475569; }

    /* ── Class widget ── */
    .class-name-big {
      font-size: 20px;
      font-weight: 800;
      color: #e2e8f0;
      text-align: center;
      padding: 8px 6px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .class-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cnav-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .cnav-btn:hover:not(:disabled) { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .cnav-btn:disabled { opacity: 0.25; cursor: default; }

    .class-pos {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.06em;
    }

    /* ── Timer progress bar ── */
    .timer-bar-wrap {
      height: 5px;
      background: #1e293b;
      border-radius: 3px;
      margin: 6px 2px 10px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      border-radius: 3px;
      background: #3b82f6;
      width: 100%;
    }

    /* ── Add-time row ── */
    .timer-add-row { display: flex; gap: 5px; margin-top: 0; margin-bottom: 6px; }

    .abtn {
      flex: 1;
      padding: 7px 0;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .abtn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Timer control row (Start / Clear) ── */
    .timer-ctrl-row { display: flex; gap: 6px; }

    .tbtn-start {
      flex: 2;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .tbtn-start:hover { background: #1d4ed8; }
    .tbtn-start.running { background: #334155; color: #e2e8f0; }
    .tbtn-start.running:hover { background: #475569; }

    .tbtn-clear {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tbtn-clear:hover { background: #334155; color: #e2e8f0; }

    /* ── Deck counter ── */
    .deck-info {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #334155;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── Attendance open button ── */
    .att-open-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .att-open-btn:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Attendance modal ── */
    .att-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .att-overlay.open { display: flex; }

    .att-modal {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      width: min(420px, 92vw);
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.85);
    }

    .att-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #1e293b;
    }

    .att-title { font-size: 16px; font-weight: 800; color: #f8fafc; }
    .att-sub   { font-size: 12px; color: #475569; margin-top: 2px; }

    .att-close {
      background: #1e293b;
      border: none;
      color: #64748b;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .att-close:hover { background: #334155; color: #e2e8f0; }

    .att-list {
      overflow-y: auto;
      padding: 12px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .att-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: filter 0.12s;
      user-select: none;
    }

    .att-row.present { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); }
    .att-row.absent  { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
    .att-row:hover   { filter: brightness(1.15); }

    .att-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }

    .att-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 6px;
    }

    .att-badge.present { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .att-badge.absent  { background: rgba(239,68,68,0.15); color: #f87171; }

    .att-footer {
      padding: 14px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
    }

    .att-all-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .att-all-btn:hover { background: #334155; color: #e2e8f0; }

    .att-save-btn {
      flex: 2;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .att-save-btn:hover { background: #1d4ed8; }

    /* ── Attendance tardy ── */
    .att-row.tardy  { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.2); }
    .att-badge.tardy { background: rgba(251,191,36,0.2); color: #fbbf24; }

    /* ── Display timer numpad ── */
    .disp-numpad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }
    .dp-btn {
      padding: 7px 2px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dp-btn:active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .timer-num.entry { color: #60a5fa !important; }

    .tbtn-start.done { background: #dc2626; }
    .tbtn-start.done:hover { background: #b91c1c; }

    /* ── Materials widget ── */
    .mat-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: filter 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .mat-btn:last-child { margin-bottom: 0; }
    .mat-btn:hover { filter: brightness(1.12); }
    .mat-btn.mat-active { outline: 2px solid rgba(255,255,255,0.7); outline-offset: 1px; }

    .mat-empty {
      font-size: 11px;
      color: #334155;
      text-align: center;
      padding: 6px 0;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    /* ── Timer done overlay ── */
    .done-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      animation: pulse-ring 1s ease-in-out infinite alternate;
    }

    .done-overlay.show { opacity: 1; }

    @keyframes pulse-ring {
      from { box-shadow: inset 0 0 0 6px rgba(239,68,68,0.5); }
      to   { box-shadow: inset 0 0 0 22px rgba(239,68,68,0.9); }
    }
  </style>
</head>
<body>

<div class="done-overlay" id="doneOverlay"></div>

<!-- Slides -->
<div class="slides-bg">
  <div class="slides-inner" id="slidesInner">
    <div class="slides-placeholder" id="slidesPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Waiting for slides…</p>
    </div>
  </div>
</div>

<!-- Class Widget -->
<div class="widget" id="classWidget">
  <div class="widget-handle" id="classHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Class</div>
  </div>
  <div class="widget-body">
    <div class="class-name-big" id="classNameBig">—</div>
    <div class="class-nav">
      <button class="cnav-btn" id="classPrevBtn" onclick="prevClass()">‹</button>
      <div class="class-pos" id="classPos">— / —</div>
      <button class="cnav-btn" id="classNextBtn" onclick="nextClass()">›</button>
    </div>
    <button class="att-open-btn" onclick="openAttendance()">Attendance</button>
  </div>
</div>

<!-- Timer Widget -->
<div class="widget" id="timerWidget">
  <div class="widget-handle" id="timerHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Timer</div>
  </div>
  <div class="widget-body">
    <div class="timer-tap" onclick="tapTimer()">
      <div class="timer-num" id="timerNum">2:00</div>
      <div class="timer-hint" id="timerHint">Tap to start</div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="disp-numpad">
      <button class="dp-btn" onclick="dispNumpadPress(1)">1</button>
      <button class="dp-btn" onclick="dispNumpadPress(2)">2</button>
      <button class="dp-btn" onclick="dispNumpadPress(3)">3</button>
      <button class="dp-btn" onclick="dispNumpadPress(4)">4</button>
      <button class="dp-btn" onclick="dispNumpadPress(5)">5</button>
      <button class="dp-btn" onclick="dispNumpadPress(6)">6</button>
      <button class="dp-btn" onclick="dispNumpadPress(7)">7</button>
      <button class="dp-btn" onclick="dispNumpadPress(8)">8</button>
      <button class="dp-btn" onclick="dispNumpadPress(9)">9</button>
      <button class="dp-btn" onclick="dispNumpadPress(0)">0</button>
    </div>
    <div class="timer-add-row">
      <button class="abtn" onclick="addTime(-10)">−10s</button>
      <button class="abtn" onclick="addTime(10)">+10s</button>
      <button class="abtn" onclick="addTime(30)">+30s</button>
      <button class="abtn" onclick="addTime(60)">+1m</button>
    </div>
    <div class="timer-ctrl-row">
      <button class="tbtn-start" id="dispStartBtn" onclick="tapTimer()">▶ Start</button>
      <button class="tbtn-clear" onclick="clearDisplayTimer()">Clear</button>
    </div>
  </div>
</div>

<!-- Picker Widget -->
<div class="widget" id="pickerWidget">
  <div class="widget-handle" id="pickerHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Students</div>
  </div>
  <div class="widget-body">
    <div class="pick-display">
      <div class="pick-sub" id="pickSub" style="visibility:hidden">Called On</div>
      <div class="pick-name" id="pickName"></div>
    </div>
    <div class="deck-info" id="deckInfo"></div>
    <div class="pick-btns">
      <button class="pbtn-pick purple" onclick="pickRandom()">Pick</button>
      <button class="pbtn-pick gray"   onclick="clearPick()">Clear</button>
    </div>
  </div>
</div>

<!-- Materials Widget -->
<div class="widget" id="matsWidget">
  <div class="widget-handle" id="matsHandle">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-label">Materials</div>
  </div>
  <div class="widget-body">
    <div id="matsBody">
      <div class="mat-empty">No materials loaded</div>
    </div>
    <button class="att-open-btn" style="margin-top:6px;" onclick="openDisplayPresets()">📂 Load Set</button>
  </div>
</div>

<!-- Attendance Modal -->
<div class="att-overlay" id="attOverlay">
  <div class="att-modal">
    <div class="att-header">
      <div>
        <div class="att-title">Attendance</div>
        <div class="att-sub" id="attSub"></div>
      </div>
      <button class="att-close" onclick="closeAttendance()">✕</button>
    </div>
    <div class="att-list" id="attList"></div>
    <div class="att-footer">
      <button class="att-all-btn" onclick="markAllPresent()">All Present</button>
      <button class="att-save-btn" onclick="saveAttendance()">Save &amp; Close</button>
    </div>
  </div>
</div>

<!-- Load Set Modal (display) -->
<div class="att-overlay" id="dispPresetsOverlay">
  <div class="att-modal">
    <div class="att-header">
      <div>
        <div class="att-title">Load Material Set</div>
        <div class="att-sub">Replaces widget buttons locally</div>
      </div>
      <button class="att-close" onclick="closeDisplayPresets()">✕</button>
    </div>
    <div class="att-list" id="dispPresetsList"></div>
    <div class="att-footer">
      <button class="att-all-btn" onclick="resetDisplayMaterials()">Use Roster Materials</button>
      <button class="att-save-btn" onclick="closeDisplayPresets()">Close</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // ── Class roster state ─────────────────────────────────────
  let allRosters    = {};
  let rosterIds     = [];
  let activeRosterId = null;

  function updateClassWidget() {
    const name = allRosters[activeRosterId]?.name || '—';
    document.getElementById('classNameBig').textContent = name;
    const idx   = rosterIds.indexOf(activeRosterId);
    const total = rosterIds.length;
    document.getElementById('classPos').textContent = total > 0 ? `${idx + 1} / ${total}` : '— / —';
    document.getElementById('classPrevBtn').disabled = idx <= 0;
    document.getElementById('classNextBtn').disabled = idx >= total - 1;
  }

  function prevClass() {
    const idx = rosterIds.indexOf(activeRosterId);
    if (idx > 0) socket.emit('roster:activate', rosterIds[idx - 1]);
  }

  function nextClass() {
    const idx = rosterIds.indexOf(activeRosterId);
    if (idx < rosterIds.length - 1) socket.emit('roster:activate', rosterIds[idx + 1]);
  }

  // ── Drag & drop ────────────────────────────────────────────
  const POS_KEY = 'croom_widget_pos_v1';

  function loadPos() {
    try { return JSON.parse(localStorage.getItem(POS_KEY)) || {}; } catch { return {}; }
  }

  function savePos(key, x, y) {
    const p = loadPos();
    p[key] = { x, y };
    localStorage.setItem(POS_KEY, JSON.stringify(p));
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function placeWidget(el, x, y) {
    const mx = window.innerWidth  - el.offsetWidth;
    const my = window.innerHeight - el.offsetHeight;
    el.style.left = clamp(x, 0, mx) + 'px';
    el.style.top  = clamp(y, 0, my) + 'px';
  }

  function makeDraggable(el, handle, key, defaultX, defaultY) {
    const saved = loadPos()[key];
    placeWidget(el, saved ? saved.x : defaultX, saved ? saved.y : defaultY);

    let active = false, ox, oy, sx, sy;

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      active = true; sx = e.clientX; sy = e.clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      el.classList.add('dragging');
    });

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      active = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      el.classList.add('dragging');
    }, { passive: false });

    document.addEventListener('mousemove', e => {
      if (!active) return;
      placeWidget(el, ox + e.clientX - sx, oy + e.clientY - sy);
    });

    document.addEventListener('touchmove', e => {
      if (!active) return;
      e.preventDefault();
      placeWidget(el, ox + e.touches[0].clientX - sx, oy + e.touches[0].clientY - sy);
    }, { passive: false });

    function end() {
      if (!active) return;
      active = false;
      el.classList.remove('dragging');
      savePos(key, parseInt(el.style.left), parseInt(el.style.top));
    }

    document.addEventListener('mouseup',  end);
    document.addEventListener('touchend', end);
  }

  window.addEventListener('load', () => {
    const tw = document.getElementById('timerWidget');
    const pw = document.getElementById('pickerWidget');
    const cw = document.getElementById('classWidget');
    const mw = document.getElementById('matsWidget');
    const cy = Math.round((window.innerHeight - tw.offsetHeight) / 2);
    makeDraggable(tw, document.getElementById('timerHandle'),  'timer',  16, cy);
    makeDraggable(pw, document.getElementById('pickerHandle'), 'picker', window.innerWidth - pw.offsetWidth - 16, cy);
    makeDraggable(cw, document.getElementById('classHandle'),  'class',  Math.round((window.innerWidth - cw.offsetWidth) / 2), window.innerHeight - cw.offsetHeight - 16);
    makeDraggable(mw, document.getElementById('matsHandle'),   'mats',   Math.round((window.innerWidth - mw.offsetWidth) / 2), 16);
  });

  // ── Audio alarm ────────────────────────────────────────────
  let alarmCtx = null;

  function stopAlarm() {
    if (alarmCtx) { try { alarmCtx.close(); } catch (_) {} alarmCtx = null; }
  }

  function playAlarm() {
    stopAlarm();
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      alarmCtx = ctx;
      // 5 repetitions spaced 2s apart (covers 10s done window)
      for (let rep = 0; rep < 5; rep++) {
        const base = rep * 2;
        [[523.25, 0], [659.25, 0.28], [783.99, 0.56]].forEach(([freq, delay]) => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.value = freq;
          const t = ctx.currentTime + base + delay;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.22, t + 0.06);
          g.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
          osc.start(t); osc.stop(t + 1.8);
        });
      }
    } catch (_) {}
  }

  // ── Timer ──────────────────────────────────────────────────
  let dur = 120, rem = 120, running = false;

  const timerNum  = document.getElementById('timerNum');
  const timerHint = document.getElementById('timerHint');
  const doneOv    = document.getElementById('doneOverlay');

  function fmt(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function scaleTimerFont(text) {
    const len = text.length;
    timerNum.style.fontSize    = len <= 4 ? '56px' : len <= 5 ? '48px' : len <= 7 ? '38px' : '32px';
    timerNum.style.letterSpacing = len >= 7 ? '-2px' : '-3px';
  }

  function renderTimer(remaining, duration, isRunning) {
    if (dispNumpadActive) return;
    if (doneActive && remaining > 0) stopDone();
    const text = fmt(remaining);
    timerNum.textContent  = text;
    scaleTimerFont(text);
    timerHint.textContent = isRunning ? 'Tap to pause' : (remaining === 0 && duration > 0 ? "Time's up" : 'Tap to start');
    timerNum.classList.remove('warning', 'urgent', 'entry');
    const pct = duration > 0 ? remaining / duration : (remaining > 0 ? 1 : 0);
    const bar = document.getElementById('timerBar');
    bar.style.width = (pct * 100) + '%';
    bar.style.background = (pct <= 0.1) ? '#ef4444' : (pct <= 0.25) ? '#fbbf24' : '#3b82f6';
    if (remaining > 0 && pct <= 0.1)        timerNum.classList.add('urgent');
    else if (remaining > 0 && pct <= 0.25)  timerNum.classList.add('warning');
    const btn = document.getElementById('dispStartBtn');
    if (btn) { btn.textContent = isRunning ? '⏸ Pause' : '▶ Start'; btn.classList.toggle('running', isRunning); btn.classList.remove('done'); }
  }

  // ── Display numpad ──────────────────────────────────────────
  let dispNumpadBuf    = [0,0,0,0,0,0]; // [H2,H1,M2,M1,S2,S1]
  let dispNumpadActive = false;
  let doneOverlayTimer = null;
  let doneActive       = false;

  function stopDone() {
    doneActive = false;
    doneOv.classList.remove('show');
    if (doneOverlayTimer) { clearTimeout(doneOverlayTimer); doneOverlayTimer = null; }
    stopAlarm();
    const btn = document.getElementById('dispStartBtn');
    if (btn) { btn.textContent = '▶ Start'; btn.classList.remove('running', 'done'); }
  }

  function dispNumpadFmt() {
    const [h2,h1,m2,m1,s2,s1] = dispNumpadBuf;
    const hrs = h2*10+h1, mins = m2*10+m1, secs = s2*10+s1;
    if (hrs > 0) return `${hrs}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    return `${mins}:${String(secs).padStart(2,'0')}`;
  }

  function dispNumpadToSecs() {
    const [h2,h1,m2,m1,s2,s1] = dispNumpadBuf;
    return (h2*10+h1)*3600 + (m2*10+m1)*60 + (s2*10+s1);
  }

  function dispNumpadPress(d) {
    dispNumpadActive = true;
    dispNumpadBuf.shift();
    dispNumpadBuf.push(d);
    const text = dispNumpadFmt();
    timerNum.textContent = text;
    scaleTimerFont(text);
    timerNum.classList.remove('warning','urgent');
    timerNum.classList.add('entry');
    timerHint.textContent = 'Press Start';
    const btn = document.getElementById('dispStartBtn');
    btn.textContent = '▶ Start'; btn.classList.remove('running');
  }

  function dispNumpadBackspace() {
    if (!dispNumpadActive) return;
    dispNumpadBuf.unshift(0);
    dispNumpadBuf.pop();
    if (dispNumpadBuf.every(d => d === 0)) {
      dispNumpadActive = false;
      timerNum.classList.remove('entry');
      renderTimer(rem, dur, running);
    } else {
      const text = dispNumpadFmt();
      timerNum.textContent = text;
      scaleTimerFont(text);
    }
  }

  function dispNumpadClear() {
    dispNumpadBuf = [0,0,0,0,0,0];
    dispNumpadActive = false;
    timerNum.classList.remove('entry');
    renderTimer(rem, dur, running);
  }

  function tapTimer() {
    if (doneActive) { stopDone(); return; }
    if (dispNumpadActive) {
      const secs = dispNumpadToSecs();
      if (secs > 0) {
        dispNumpadBuf = [0,0,0,0,0,0];
        dispNumpadActive = false;
        timerNum.classList.remove('entry');
        socket.emit('timer:set-start', secs);
      }
    } else {
      socket.emit(running ? 'timer:pause' : 'timer:start');
    }
  }

  function clearDisplayTimer() {
    if (dispNumpadActive) {
      dispNumpadClear();
    } else {
      socket.emit('timer:reset');
    }
  }

  function addTime(s) { socket.emit('timer:add', s); }

  function updateDeckInfo(remaining, total) {
    const el = document.getElementById('deckInfo');
    if (!total) { el.textContent = ''; return; }
    el.textContent = remaining === 0 ? 'All called — reshuffling next' : `${remaining} of ${total} remaining`;
  }

  socket.on('state', s => {
    dur = s.timer.duration; rem = s.timer.remaining; running = s.timer.running;
    renderTimer(rem, dur, running);
    if (s.pick.name) showPick(s.pick.name, false);
    if (s.slides.url) switchToMaterial(s.slides.url);
    allRosters     = s.rosters || {};
    rosterIds      = Object.keys(allRosters);
    activeRosterId = s.activeRosterId;
    updateClassWidget();
    updateDeckInfo(s.deckRemaining, s.deckTotal);
    renderMaterialsWidget();
  });

  socket.on('deck:update', ({ remaining, total }) => updateDeckInfo(remaining, total));

  socket.on('roster:all', data => {
    allRosters = data;
    rosterIds  = Object.keys(data);
    updateClassWidget();
    renderMaterialsWidget();
  });

  socket.on('roster:activated', ({ id }) => {
    activeRosterId = id;
    displayMaterialsOverride = null;
    updateClassWidget();
    renderMaterialsWidget();
  });

  socket.on('pick:stats', ({ rosterId, students }) => {
    if (allRosters[rosterId]) allRosters[rosterId].students = students;
  });

  socket.on('timer:update', t => {
    dur = t.duration; rem = t.remaining; running = t.running;
    renderTimer(rem, dur, running);
  });

  socket.on('timer:tick', r => { rem = r; renderTimer(rem, dur, running); });

  socket.on('timer:done', () => {
    running = false; rem = 0; doneActive = true;
    if (!dispNumpadActive) {
      const text = fmt(0);
      timerNum.textContent = text;
      scaleTimerFont(text);
      timerNum.classList.remove('warning','urgent','entry');
      timerNum.classList.add('urgent');
      timerHint.textContent = "Time's up";
      document.getElementById('timerBar').style.width = '0%';
      document.getElementById('timerBar').style.background = '#ef4444';
      const btn = document.getElementById('dispStartBtn');
      btn.textContent = '⏹ Stop'; btn.classList.remove('running'); btn.classList.add('done');
    }
    doneOv.classList.add('show');
    if (doneOverlayTimer) clearTimeout(doneOverlayTimer);
    doneOverlayTimer = setTimeout(stopDone, 10000);
    playAlarm();
  });

  // ── Picker ──────────────────────────────────────────────────
  let pickCleared = false;

  function pickRandom() { socket.emit('pick:random'); }

  function clearPick() {
    const name = document.getElementById('pickName').textContent.trim();
    if (name) {
      socket.emit('pick:clear');
      pickCleared = true;
    } else if (pickCleared) {
      socket.emit('pick:reset-deck');
      pickCleared = false;
    }
  }

  const pickName = document.getElementById('pickName');
  const pickSub  = document.getElementById('pickSub');

  function showPick(name, animate = true) {
    pickCleared = false;
    pickSub.style.visibility = 'visible';
    pickName.classList.remove('pop', 'visible');
    void pickName.offsetWidth;
    pickName.textContent = name;
    pickName.classList.add(animate ? 'pop' : 'visible');
  }

  socket.on('pick:show', name => showPick(name, true));
  socket.on('pick:clear', () => {
    pickName.classList.remove('pop', 'visible');
    pickSub.style.visibility = 'hidden';
    setTimeout(() => { pickName.textContent = ''; }, 300);
  });

  // ── Slides (multi-iframe — each material keeps its own iframe) ──
  const iframeMap    = {}; // rawUrl → iframe element
  const embedBaseMap = {}; // rawUrl → base embed URL (no slide params)
  let activeRawUrl   = '';

  function toEmbedUrl(url) {
    const m = url.match(/src=["']([^"']+)["']/);
    if (m) url = m[1];
    if (url.includes('/embed')) return url;
    const pub = url.match(/\/presentation\/d\/e\/([^/?#]+)/);
    if (pub) return `https://docs.google.com/presentation/d/e/${pub[1]}/embed`;
    const doc = url.match(/\/presentation\/d\/([^/?#]+)/);
    if (doc) return `https://docs.google.com/presentation/d/${doc[1]}/embed`;
    return url;
  }

  function switchToMaterial(rawUrl) {
    if (!rawUrl) return;
    const ph = document.getElementById('slidesPlaceholder');
    // Hide all existing iframes
    Object.values(iframeMap).forEach(f => f.style.display = 'none');
    if (iframeMap[rawUrl]) {
      // Already loaded — just reveal it (position preserved)
      ph.style.display = 'none';
      iframeMap[rawUrl].style.display = '';
    } else {
      // First time — create iframe
      let eu = toEmbedUrl(rawUrl);
      if (!eu.includes('?')) eu += '?start=false&loop=false&delayms=3000';
      embedBaseMap[rawUrl] = eu;
      ph.style.display = 'none';
      const iframe = document.createElement('iframe');
      iframe.allowFullscreen = true;
      iframe.src = eu;
      document.getElementById('slidesInner').appendChild(iframe);
      iframeMap[rawUrl] = iframe;
    }
    activeRawUrl = rawUrl;
  }

  function navigateToSlide(n) {
    const iframe  = iframeMap[activeRawUrl];
    const baseUrl = embedBaseMap[activeRawUrl];
    if (!iframe || !baseUrl) return;
    const base  = baseUrl.replace(/[&?]slide=[^&]*|[&?]page=[^&]*/g, '');
    const sep   = base.includes('?') ? '&' : '?';
    const param = baseUrl.includes('drive.google.com/file') ? `page=${n}` : `slide=id.p${n}`;
    iframe.src  = base + sep + param;
  }

  socket.on('slides:update',   url   => { if (url) switchToMaterial(url); });
  socket.on('slides:navigate', slide => navigateToSlide(slide));

  // ── Materials widget ────────────────────────────────────────
  const MAT_TYPES = [
    { key: 'slides', label: 'Slides', bg: '#F9AB00', color: '#1a1a1a' },
    { key: 'doc',    label: 'Doc',    bg: '#1a73e8', color: '#fff'    },
    { key: 'pdf',    label: 'PDF',    bg: '#9f1239', color: '#fecdd3' },
    { key: 'web',    label: 'Web',    bg: '#0d9488', color: '#fff'    },
  ];

  function renderMaterialsWidget() {
    const r    = allRosters[activeRosterId];
    const body = document.getElementById('matsBody');
    let mats   = displayMaterialsOverride;
    if (!mats) try { mats = JSON.parse(r?.materials || '[]'); } catch { mats = []; }

    body.innerHTML = '';

    if (!mats.length) {
      body.innerHTML = '<div class="mat-empty">No materials loaded</div>';
      return;
    }

    const byType = { slides: [], doc: [], pdf: [] };
    mats.forEach(m => {
      const k = (m.type || 'pdf').toLowerCase();
      (byType[k] || byType.pdf).push(m);
    });

    MAT_TYPES.forEach(({ key, label, bg, color }) => {
      const items = byType[key] || [];
      items.forEach((m, i) => {
        const btnLabel = items.length > 1 ? `${label} ${i + 1}` : label;
        const t = (m.title || '').trim();
        const isUrl = !t || t.startsWith('http') || t.startsWith('www.') || t.includes('://');
        const display = isUrl ? btnLabel : t;
        const btn = document.createElement('button');
        btn.className = 'mat-btn' + (m.url === activeRawUrl ? ' mat-active' : '');
        btn.style.cssText = `background:${bg};color:${color};border-color:${bg}`;
        btn.textContent = display;
        btn.onclick = () => {
          switchToMaterial(m.url);
          document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('mat-active'));
          btn.classList.add('mat-active');
        };
        body.appendChild(btn);
      });
    });
  }

  // ── Attendance ─────────────────────────────────────────────
  let attStudents = [];

  function fullNameDisplay(s) {
    if (!s) return '';
    if (s.firstName || s.lastName) return [s.firstName, s.lastName].filter(Boolean).join(' ');
    return s.name || '';
  }

  function parseRosterStudents(raw) {
    if (!raw) return [];
    const base = { firstName:'', lastName:'', attendance:'present', anchor:false, enl:false, introvert:false, gender:'', conflict:'', distractor:false, picks:0 };
    try {
      const p = JSON.parse(raw);
      if (Array.isArray(p)) return p.map(s => {
        if (typeof s === 'string') {
          const w = s.trim().split(/\s+/);
          return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' ') };
        }
        let student;
        if (s.name && !s.firstName) {
          const w = (s.name||'').trim().split(/\s+/);
          student = { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' '), ...s };
        } else {
          student = { ...base, ...s };
        }
        if (s.present === false && !s.attendance) student.attendance = 'absent';
        return student;
      });
    } catch {}
    return raw.split('\n').map(s => s.trim()).filter(Boolean).map(name => {
      const w = name.split(/\s+/);
      return { ...base, firstName: w[0]||'', lastName: w.slice(1).join(' ') };
    });
  }

  function openAttendance() {
    const r = allRosters[activeRosterId];
    if (!r) return;
    attStudents = parseRosterStudents(r.students);
    document.getElementById('attSub').textContent = r.name;
    renderAttList();
    document.getElementById('attOverlay').classList.add('open');
  }

  function closeAttendance() {
    document.getElementById('attOverlay').classList.remove('open');
  }

  function renderAttList() {
    const list = document.getElementById('attList');
    list.innerHTML = '';
    attStudents.forEach((s, i) => {
      const att = s.attendance || 'present';
      const label = att === 'present' ? 'Present' : att === 'absent' ? 'Absent' : 'Tardy';
      const row = document.createElement('div');
      row.className = 'att-row ' + att;
      row.innerHTML = `<span class="att-name">${fullNameDisplay(s)}</span><span class="att-badge ${att}">${label}</span>`;
      row.onclick = () => {
        const cur = attStudents[i].attendance || 'present';
        attStudents[i].attendance = cur === 'present' ? 'absent' : cur === 'absent' ? 'tardy' : 'present';
        renderAttList();
      };
      list.appendChild(row);
    });
  }

  function markAllPresent() {
    attStudents.forEach(s => s.attendance = 'present');
    renderAttList();
  }

  function saveAttendance() {
    const r = allRosters[activeRosterId];
    if (!r || !activeRosterId) return;
    const studentsJson = JSON.stringify(attStudents);
    socket.emit('roster:save', {
      id: activeRosterId,
      name: r.name,
      students: studentsJson,
      slidesUrl: r.slidesUrl || '',
      sortOrder: 0,
      materials: r.materials || '[]'
    });
    allRosters[activeRosterId].students = studentsJson;
    closeAttendance();
  }

  // ── Material presets (display — local load only) ────────────
  let allPresets = [];
  let displayMaterialsOverride = null;

  socket.on('presets:all', (presets) => {
    allPresets = presets || [];
  });

  function openDisplayPresets() {
    const list = document.getElementById('dispPresetsList');
    if (!allPresets.length) {
      list.innerHTML = '<div class="mat-empty" style="padding:16px 0;">No saved sets yet.</div>';
    } else {
      list.innerHTML = allPresets.map(p => {
        let count = 0;
        try { count = JSON.parse(p.materials).length; } catch {}
        const row = document.createElement('div');
        return `<div class="att-row present" style="cursor:pointer;" onclick="applyDisplayPreset('${p.id}')">
          <span class="att-name">${p.name}</span>
          <span class="att-badge present">${count} item${count !== 1 ? 's' : ''}</span>
        </div>`;
      }).join('');
    }
    document.getElementById('dispPresetsOverlay').classList.add('open');
  }

  function closeDisplayPresets() {
    document.getElementById('dispPresetsOverlay').classList.remove('open');
  }

  function applyDisplayPreset(id) {
    const p = allPresets.find(x => x.id === id);
    if (!p) return;
    try { displayMaterialsOverride = JSON.parse(p.materials); } catch { return; }
    renderMaterialsWidget();
    closeDisplayPresets();
  }

  function resetDisplayMaterials() {
    displayMaterialsOverride = null;
    renderMaterialsWidget();
    closeDisplayPresets();
  }
</script>
</body>
</html>

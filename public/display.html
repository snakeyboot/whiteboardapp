<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      gap: 16px;
      flex-shrink: 0;
      min-height: 90px;
    }

    /* ── Timer block (interactive) ── */
    .timer-block {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .timer-block:hover { background: #334155; border-color: #475569; }
    .timer-block:active { background: #475569; }

    .timer-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-ring .bg { stroke: #334155; }
    .timer-ring .fg {
      stroke: #3b82f6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }
    .timer-ring .fg.warning { stroke: #fbbf24; }
    .timer-ring .fg.urgent  { stroke: #f87171; }

    .timer-text { display: flex; flex-direction: column; gap: 2px; }

    .timer-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
    }

    .timer-value {
      font-size: 52px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: #f8fafc;
      line-height: 1;
      transition: color 0.5s;
    }

    .timer-value.warning { color: #fbbf24; }
    .timer-value.urgent  { color: #f87171; }

    .reset-btn {
      background: none;
      border: 1px solid #334155;
      color: #64748b;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      align-self: center;
    }

    .reset-btn:hover { background: #334155; color: #e2e8f0; }

    /* ── Divider ── */
    .divider {
      width: 1px;
      height: 60px;
      background: #334155;
      flex-shrink: 0;
    }

    /* ── Pick block ── */
    .pick-block {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pick-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .pick-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pick-btn.purple { background: #7c3aed; color: #fff; }
    .pick-btn.purple:hover { background: #6d28d9; }
    .pick-btn.gray { background: #334155; color: #e2e8f0; }
    .pick-btn.gray:hover { background: #475569; }

    .pick-name-area { flex: 1; }

    .pick-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 2px;
    }

    .pick-name {
      font-size: 34px;
      font-weight: 800;
      color: #fbbf24;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
    }

    .pick-name.visible { opacity: 1; transform: scale(1); }

    .pick-name.pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── Slides ── */
    .slides-area {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slides-area iframe { width: 100%; height: 100%; border: none; }

    .slides-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .slides-placeholder svg { width: 56px; height: 56px; opacity: 0.25; }
    .slides-placeholder p { font-size: 15px; color: #475569; }

    /* ── Timer done overlay ── */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      animation: pulse-ring 1s ease-in-out infinite alternate;
    }

    .done-overlay.show { display: block; }

    @keyframes pulse-ring {
      from { box-shadow: inset 0 0 0 6px rgba(239,68,68,0.5); }
      to   { box-shadow: inset 0 0 0 20px rgba(239,68,68,0.85); }
    }
  </style>
</head>
<body>

  <div class="done-overlay" id="doneOverlay"></div>

  <div class="topbar">

    <!-- Timer (tap to start/pause) -->
    <div class="timer-block" id="timerBlock" onclick="toggleTimer()">
      <div class="timer-ring">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <circle class="bg" cx="32" cy="32" r="26" fill="none" stroke-width="5"/>
          <circle class="fg" id="ringFg" cx="32" cy="32" r="26" fill="none" stroke-width="5"
            stroke-dasharray="163.4" stroke-dashoffset="0"/>
        </svg>
      </div>
      <div class="timer-text">
        <div class="timer-label" id="timerLabel">Tap to start</div>
        <div class="timer-value" id="timerValue">5:00</div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetTimer()" title="Reset timer">↺</button>

    <div class="divider"></div>

    <!-- Student picker -->
    <div class="pick-block">
      <div class="pick-actions">
        <button class="pick-btn purple" onclick="pickRandom()">Pick</button>
        <button class="pick-btn gray"   onclick="clearPick()">Clear</button>
      </div>
      <div class="pick-name-area">
        <div class="pick-label" id="pickLabel" style="visibility:hidden">Called On</div>
        <div class="pick-name" id="pickName"></div>
      </div>
    </div>

  </div>

  <!-- Slides -->
  <div class="slides-area" id="slidesArea">
    <div class="slides-placeholder" id="slidesPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Waiting for slides…</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // ── Audio chime ─────────────────────────────────────────
    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // Gentle C–E–G ascending chime
        [[523.25, 0], [659.25, 0.28], [783.99, 0.56]].forEach(([freq, delay]) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = ctx.currentTime + delay;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.22, t + 0.06);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
          osc.start(t);
          osc.stop(t + 1.8);
        });
      } catch (_) {}
    }

    // ── Timer ───────────────────────────────────────────────
    let timerDuration  = 300;
    let timerRemaining = 300;
    let timerRunning   = false;
    const circumference = 2 * Math.PI * 26; // 163.4

    const timerValue = document.getElementById('timerValue');
    const timerLabel = document.getElementById('timerLabel');
    const ringFg     = document.getElementById('ringFg');
    const doneOverlay = document.getElementById('doneOverlay');

    function fmt(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function updateTimer(remaining, duration, running) {
      timerValue.textContent = fmt(remaining);
      timerLabel.textContent = running ? 'Tap to pause' : (remaining === 0 ? 'Time\'s up' : 'Tap to start');

      const pct = duration > 0 ? remaining / duration : 1;
      ringFg.style.strokeDashoffset = circumference * (1 - pct);

      timerValue.classList.remove('warning', 'urgent');
      ringFg.classList.remove('warning', 'urgent');
      doneOverlay.classList.remove('show');

      if (remaining === 0) {
        timerValue.classList.add('urgent');
        ringFg.classList.add('urgent');
        doneOverlay.classList.add('show');
      } else if (pct <= 0.1) {
        timerValue.classList.add('urgent');
        ringFg.classList.add('urgent');
      } else if (pct <= 0.25) {
        timerValue.classList.add('warning');
        ringFg.classList.add('warning');
      }
    }

    function toggleTimer() { socket.emit(timerRunning ? 'timer:pause' : 'timer:start'); }
    function resetTimer()  { socket.emit('timer:reset'); }

    socket.on('state', (s) => {
      timerDuration  = s.timer.duration;
      timerRemaining = s.timer.remaining;
      timerRunning   = s.timer.running;
      updateTimer(timerRemaining, timerDuration, timerRunning);
      if (s.pick.name) showPick(s.pick.name, false);
      if (s.slides.url) loadSlides(s.slides.url);
    });

    socket.on('timer:update', (t) => {
      timerDuration  = t.duration;
      timerRemaining = t.remaining;
      timerRunning   = t.running;
      updateTimer(timerRemaining, timerDuration, timerRunning);
    });

    socket.on('timer:tick', (remaining) => {
      timerRemaining = remaining;
      updateTimer(timerRemaining, timerDuration, timerRunning);
    });

    socket.on('timer:done', () => {
      timerRunning = false;
      updateTimer(0, timerDuration, false);
      playChime();
    });

    // ── Picker ──────────────────────────────────────────────
    const pickName  = document.getElementById('pickName');
    const pickLabel = document.getElementById('pickLabel');

    function pickRandom() { socket.emit('pick:random'); }
    function clearPick()  { socket.emit('pick:clear'); }

    function showPick(name, animate = true) {
      pickLabel.style.visibility = 'visible';
      pickName.classList.remove('pop', 'visible');
      void pickName.offsetWidth;
      pickName.textContent = name;
      pickName.classList.add(animate ? 'pop' : 'visible');
    }

    socket.on('pick:show', (name) => showPick(name, true));

    socket.on('pick:clear', () => {
      pickName.classList.remove('pop', 'visible');
      pickLabel.style.visibility = 'hidden';
      setTimeout(() => { pickName.textContent = ''; }, 300);
    });

    // ── Slides ──────────────────────────────────────────────
    function toEmbedUrl(url) {
      const srcMatch = url.match(/src=["']([^"']+)["']/);
      if (srcMatch) url = srcMatch[1];
      if (url.includes('/embed')) return url;
      const pubMatch = url.match(/\/presentation\/d\/e\/([^/?#]+)/);
      if (pubMatch) return `https://docs.google.com/presentation/d/e/${pubMatch[1]}/embed`;
      const docMatch = url.match(/\/presentation\/d\/([^/?#]+)/);
      if (docMatch) return `https://docs.google.com/presentation/d/${docMatch[1]}/embed`;
      return url;
    }

    function loadSlides(url) {
      if (!url) return;
      let embedUrl = toEmbedUrl(url);
      if (!embedUrl.includes('?')) embedUrl += '?start=false&loop=false&delayms=3000';

      const placeholder = document.getElementById('slidesPlaceholder');
      let iframe = document.querySelector('#slidesArea iframe');
      if (!iframe) {
        placeholder.style.display = 'none';
        iframe = document.createElement('iframe');
        iframe.allowFullscreen = true;
        document.getElementById('slidesArea').appendChild(iframe);
      }
      iframe.src = embedUrl;
    }

    socket.on('slides:update', (url) => { if (url) loadSlides(url); });
  </script>
</body>
</html>
